<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détection live</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #111; color: #fff; display: flex; flex-direction: column;
           align-items: center; min-height: 100vh; padding: 1rem; }

    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; color: #ddd; }

    #video-wrap { position: relative; width: 100%; max-width: 480px; }
    video  { width: 100%; border-radius: 12px; display: block; }
    canvas { display: none; }

    #result {
      width: 100%; max-width: 480px;
      margin-top: 1rem; padding: 16px 20px;
      border-radius: 12px; text-align: center;
      font-size: 22px; font-weight: 500;
      transition: all .2s;
      min-height: 70px; display: flex;
      align-items: center; justify-content: center;
    }
    .known   { background: #0F6E56; color: #fff; }
    .unknown { background: #7B2020; color: #fff; }
    .waiting { background: #333;    color: #888; font-size: 14px; }

    #conf {
      font-size: 13px; margin-top: 8px;
      color: #888; text-align: center;
    }

    #status {
      font-size: 11px; color: #555;
      margin-top: 8px; text-align: center;
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #1D9E75; display: inline-block;
      margin-right: 6px; animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>

  <h1>🔍 Détection en temps réel</h1>

  <div id="video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="result" class="waiting">En attente...</div>
  <div id="conf"></div>
  <div id="status"><span class="dot"></span>Live</div>

  <script>
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const result  = document.getElementById('result');
    const confDiv = document.getElementById('conf');
    const ctx     = canvas.getContext('2d');

    let isProcessing = false;

    // ---- Activer la caméra ----
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment' },  // caméra arrière du téléphone
          audio: false
        });
        video.srcObject = stream;
      } catch (e) {
        result.textContent = 'Caméra non disponible';
        result.className = 'unknown';
      }
    }

    // ---- Capturer une frame et envoyer au serveur ----
    async function captureAndPredict() {
      if (isProcessing || video.readyState < 2) return;
      isProcessing = true;

      // Capturer frame
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      // Convertir en Blob JPEG
      canvas.toBlob(async (blob) => {
        try {
          const formData = new FormData();
          formData.append('file', blob, 'frame.jpg');

          const response = await fetch('/predict', {
            method: 'POST',
            body: formData
          });
          const data = await response.json();

          // Afficher résultat
          if (data.status === 'known') {
            result.textContent = '✅  ' + data.name;
            result.className   = 'known';
            confDiv.textContent = 'Confiance : ' + data.confidence + '%';
          } else if (data.status === 'unknown') {
            result.textContent = '❌  This object is not defined in my data';
            result.className   = 'unknown';
            confDiv.textContent = 'Confiance max : ' + data.confidence + '%';
          }

        } catch (e) {
          result.textContent = 'Erreur connexion serveur';
          result.className   = 'unknown';
        }

        isProcessing = false;
      }, 'image/jpeg', 0.8);
    }

    // ---- Lancer la détection toutes les 500ms ----
    startCamera();
    setInterval(captureAndPredict, 500);
  </script>

</body>
</html>
